
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arpit Yadav | SDE Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f1115;
      color: #e2e8f0;
      scrollbar-width: thin;
      scrollbar-color: #334155 #0f1115;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f1115;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    .text-yellow-brand { color: #ffbd12; }
    .bg-yellow-brand { background-color: #ffbd12; }
    .border-yellow-brand { border-color: #ffbd12; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }

    /* Custom Cursor Styles */
    @media (hover: hover) and (pointer: fine) {
      * {
        cursor: none !important;
      }
    }
    
    .custom-cursor {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      transform: translate(-2px, -2px);
      z-index: 10001;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.15s ease;
      filter: drop-shadow(0 0 2px rgba(255, 189, 18, 0.3));
    }
    
    .custom-cursor.visible {
      opacity: 0.95;
    }
    
    .custom-cursor.hover {
      transform: translate(-2px, -2px) scale(1.15);
      opacity: 1;
      filter: drop-shadow(0 0 4px rgba(255, 189, 18, 0.5));
    }
    
    .custom-cursor-trail {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10000;
    }
    
    input, textarea, select {
      cursor: auto !important;
    }

    /* ── Hero 3D Grid Layout ───────────────────────────── */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: center;
      width: 100%;
      max-width: 1400px;
    }

    .hero-text-content {
      z-index: 2;
    }

    .hero-3d-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 500px;
    }

    /* Glow ring behind the 3D image */
    .hero-3d-wrapper::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 340px;
      height: 340px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,189,18,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-3d-container {
      width: 100%;
      height: 520px;
      position: relative;
      z-index: 1;
    }

    .hero-3d-container canvas {
      border-radius: 16px;
    }

    /* Fallback */
    .hero-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 16px;
    }

    .hero-fallback-img {
      width: 100%;
      max-width: 400px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 40px rgba(255,189,18,0.15));
      animation: fallbackFloat 4s ease-in-out infinite;
    }

    @keyframes fallbackFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .hero-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .hero-3d-wrapper {
        min-height: 380px;
        order: -1;
      }
      .hero-3d-container {
        height: 400px;
      }
    }

    @media (max-width: 640px) {
      .hero-3d-wrapper {
        min-height: 280px;
      }
      .hero-3d-container {
        height: 320px;
      }
    }
  </style>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
